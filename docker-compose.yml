version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: poster-frontend
    ports:
      - "8080:80"
    networks:
      - poster-network
    restart: unless-stopped

  data-service:
    build: ./data-service
    container_name: poster-data-service
    ports:
      - "5001:5001"
    volumes:
      - data-volume:/data
    networks:
      - poster-network
    restart: unless-stopped

  workflow-service:
    build: ./workflow-service
    container_name: poster-workflow-service
    ports:
      - "5000:5000"
    environment:
      - DATA_SERVICE_URL=http://data-service:5001
    depends_on:
      - data-service
    networks:
      - poster-network
    restart: unless-stopped

volumes:
  data-volume:
    driver: local

networks:
